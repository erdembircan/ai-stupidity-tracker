name: Checks

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.10.0
          curl -sS -Lo shfmt "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git "$RUNNER_TEMP/bats"
          sudo "$RUNNER_TEMP/bats/install.sh" /usr/local

      - name: Lint
        run: make lint

      - name: Format check
        run: make fmt

      - name: Test
        run: make test
