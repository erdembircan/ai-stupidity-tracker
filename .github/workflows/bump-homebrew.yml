name: Bump Homebrew Formula

on:
  push:
    tags: 'v*'

jobs:
  checks:
    if: ${{ !contains(github.ref, '-') }}
    uses: ./.github/workflows/checks.yml

  homebrew:
    name: Bump Homebrew formula
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: ast
          formula-path: Formula/ast.rb
          homebrew-tap: erdembircan/homebrew-tap
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}

  docs:
    name: Update docs version
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update version in docs
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i -E "s|<!-- auto-updated by CI --> <td>[0-9]+\.[0-9]+\.[0-9]+</td>|<!-- auto-updated by CI --> <td>${VERSION}</td>|" index.html

      - uses: EndBug/add-and-commit@v9
        with:
          message: "docs: update version to ${{ github.ref_name }}"
